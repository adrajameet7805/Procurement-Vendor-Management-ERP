version: '3.8'

services:
  db:
    image: mysql:8
    container_name: procureflow-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: procureflow_root_pass
      MYSQL_DATABASE: procureflow_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
